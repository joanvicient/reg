openapi: 3.0.3
info:
  title: Reg Valves API
  description: API for discovering and controlling irrigation valves via ESP devices
  version: 1.0.0
  contact:
    name: Reg System
  license:
    name: MIT

servers:
  - url: http://localhost:5001
    description: Development server
  - url: http://{host}:{port}
    description: Production server
    variables:
      host:
        default: localhost
        description: Server hostname
      port:
        default: 5001
        description: Server port

paths:
  /:
    get:
      summary: Redirect to valves page
      description: Redirects to the /valves endpoint
      responses:
        '302':
          description: Redirect to /valves

  /config/:
    get:
      summary: Get configuration
      description: Returns current log level configuration
      responses:
        '200':
          description: Configuration retrieved successfully
          content:
            text/plain:
              schema:
                type: string
                example: "Log level: INFO"

    patch:
      summary: Update configuration
      description: Updates the log level configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                log_level:
                  type: string
                  enum: [INFO, DEBUG]
                  description: New log level
              required:
                - log_level
      responses:
        '202':
          description: Configuration updated successfully
          content:
            text/plain:
              schema:
                type: string
                example: "Loglevel INFO set"
        '400':
          description: Invalid log level or missing parameter
          content:
            text/plain:
              schema:
                type: string
                example: "ERROR: log_level supported: INFO, "
        '415':
          description: Request must be JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /esp/:
    get:
      summary: Get all ESP devices
      description: Returns all discovered ESP devices
      responses:
        '200':
          description: List of ESP devices retrieved successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/EspDevice'

  /valves/:
    get:
      summary: Get all valves
      description: Returns all discovered valves
      responses:
        '200':
          description: List of valves retrieved successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/Valve'

  /valves/{id}:
    get:
      summary: Get specific valve
      description: Returns information about a specific valve and forces refresh of its current value
      parameters:
        - name: id
          in: path
          required: true
          description: Valve identifier
          schema:
            type: string
      responses:
        '200':
          description: Valve information retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Valve'
        '204':
          description: Valve not found
          content:
            text/plain:
              schema:
                type: string
                example: "Not found"

    patch:
      summary: Update valve value
      description: Sets a valve to open (1) or closed (0) state
      parameters:
        - name: id
          in: path
          required: true
          description: Valve identifier
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
                  enum: ['0', '1']
                  description: '0' to close valve, '1' to open valve
              required:
                - value
      responses:
        '200':
          description: Valve updated successfully
          content:
            text/plain:
              schema:
                type: string
        '204':
          description: Valve not found
          content:
            text/plain:
              schema:
                type: string
                example: "valvename not found in valve dictionary"
        '400':
          description: Invalid value or missing parameter
          content:
            text/plain:
              schema:
                type: string
                example: "value shall be '0' or '1'"
        '415':
          description: Request must be JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Another operation is in progress
          content:
            text/plain:
              schema:
                type: string
                example: "already executing something"

  /reg/:
    put:
      summary: Schedule watering
      description: Schedules a watering task for a specific valve and duration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                valve:
                  type: string
                  description: Valve identifier
                  example: "freses"
                duration_s:
                  type: string
                  pattern: '^[0-9]+$'
                  description: Duration in seconds (must be digits)
                  example: "10"
              required:
                - valve
                - duration_s
      responses:
        '200':
          description: Watering scheduled successfully
          content:
            text/plain:
              schema:
                type: string
                example: "Scheduled freses for 10 seconds."
        '400':
          description: Invalid parameters
          content:
            text/plain:
              schema:
                type: string
                example: "unknown valve: invalid_valve"
        '415':
          description: Request must be JSON
          content:
            text/plain:
              schema:
                type: string
                example: "body shall be json"
        '500':
          description: Another operation is in progress
          content:
            text/plain:
              schema:
                type: string
                example: "already executing something"

  /log:
    get:
      summary: Get application logs
      description: Returns application logs filtered by minimum log level
      parameters:
        - name: level
          in: query
          required: false
          description: Minimum log level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
          schema:
            type: string
            enum: [DEBUG, INFO, WARNING, ERROR, CRITICAL]
            default: INFO
      responses:
        '200':
          description: Logs retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LogEntry'
        '400':
          description: Invalid log level
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    EspDevice:
      type: object
      description: ESP device information
      properties:
        ip1:
          type: string
          description: First octet of IP address
          example: "192"
        ip2:
          type: string
          description: Second octet of IP address
          example: "168"
        ip3:
          type: string
          description: Third octet of IP address
          example: "1"
        ip4:
          type: string
          description: Fourth octet of IP address
          example: "100"
        status:
          type: string
          description: Device status
          example: "ON"
      example:
        ip1: "192"
        ip2: "168"
        ip3: "1"
        ip4: "100"
        status: "ON"

    Valve:
      type: object
      description: Valve information
      properties:
        name:
          type: string
          description: Valve name
          example: "freses"
        ip:
          type: string
          description: ESP device IP address
          example: "192.168.1.100"
        gpio:
          type: string
          description: GPIO pin number
          example: "5"
        value:
          type: string
          description: Current valve state ('0' = closed, '1' = open)
          example: "0"
        esp:
          type: string
          description: ESP device identifier
          example: "esp1"
      example:
        name: "freses"
        ip: "192.168.1.100"
        gpio: "5"
        value: "0"
        esp: "esp1"

    LogEntry:
      type: object
      description: Application log entry
      properties:
        date:
          type: string
          format: date-time
          description: Log timestamp
          example: "2024-01-01 12:00:00"
        level:
          type: string
          enum: [DEBUG, INFO, WARNING, ERROR, CRITICAL]
          description: Log level
          example: "INFO"
        name:
          type: string
          description: Logger name
          example: "reg_valves"
        text:
          type: string
          description: Log message
          example: "GET valves"
      required:
        - date
        - level
        - name
        - text

    Error:
      type: object
      description: Error response
      properties:
        error:
          type: string
          description: Error message
          example: "Request must be JSON"
      required:
        - error

  examples:
    ValveUpdateRequest:
      summary: Example valve update request
      value:
        value: "1"
    
    WateringScheduleRequest:
      summary: Example watering schedule request
      value:
        valve: "freses"
        duration_s: "10"

tags:
  - name: Configuration
    description: Configuration management endpoints
  - name: Devices
    description: ESP device and valve management
  - name: Watering
    description: Watering control and scheduling
  - name: Logging
    description: Application logging
