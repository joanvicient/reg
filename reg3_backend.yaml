version: '2'
services:

  reg3_valves:
    image: jvicient/reg_valves:V2.0.0
    networks:
      - qnet-dhcp
    ports:
      - 8080:5001
    restart: unless-stopped
    stdin_open: true
    tty: true

  # reg3_water:
  #   image: jvicient/reg_water:v1.2
